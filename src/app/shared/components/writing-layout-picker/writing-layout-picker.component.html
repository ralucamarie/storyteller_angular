<div class="layout-picker" role="radiogroup" [attr.aria-label]="'writingLayout.ariaLabel' | translate">
  @for (option of options; track option.id) {
    <button
      type="button"
      class="layout-picker__btn"
      role="radio"
      [attr.aria-checked]="value() === option.id"
      [class.layout-picker__btn--active]="value() === option.id"
      [disabled]="disabled()"
      [pTooltip]="layoutLabel(option.id)"
      tooltipPosition="top"
      (click)="select(option.id)">
      <span
        class="layout-picker__preview"
        [class]="'layout-picker__preview--' + option.id"
        aria-hidden="true"></span>
      <span class="layout-picker__label">{{ layoutShort(option.id) }}</span>
    </button>
  }
</div>
