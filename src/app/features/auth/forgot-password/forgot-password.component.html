<p-card [header]="'auth.forgotPassword.title' | translate">
  <p class="text-surface-500 mb-4">
    {{ 'auth.forgotPassword.instructions' | translate }}
  </p>

  @if (successMessage()) {
    <p-message severity="success" [text]="successMessage()!" styleClass="w-full mb-4" />
  }
  @if (errorMessage()) {
    <p-message severity="error" [text]="errorMessage()!" styleClass="w-full mb-4" />
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label for="email">{{ 'auth.forgotPassword.email' | translate }}</label>
      <input id="email" type="email" pInputText formControlName="email" class="w-full" autocomplete="email" />
    </div>

    <p-button
      type="submit"
      [label]="'auth.forgotPassword.submit' | translate"
      styleClass="w-full"
      [loading]="loading()" />

    <p class="text-center text-sm text-surface-500">
      <a routerLink="/auth/login" class="text-primary font-medium">{{
        'auth.forgotPassword.backToSignIn' | translate
      }}</a>
    </p>
  </form>
</p-card>
